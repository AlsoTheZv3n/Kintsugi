name: CI

on:
  push:
    branches: [main]
  pull_request:

# Nur Lesen. Kein Job hier schreibt ins Repo.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# KINTSUGI_CONTACT wird von jedem Job geerbt, damit CLI- und Offline-Alembic-
# Schritte nicht an einer fehlenden Kontaktadresse scheitern (ADR-014/I0.1.6).
env:
  KINTSUGI_CONTACT: ops@example.invalid

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      # Stoppt eine handgeaenderte pyproject.toml, die vom Lockfile abdriftet.
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pre-commit run --all-files

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv lock --check
      - run: uv run mypy kintsugi

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv lock --check
      # Fixture-Manifest: ein editiertes Golden-Byte muss im Review auffallen,
      # nie stillschweigend durchgehen (I1.3.1).
      - run: uv run pytest tests/harness/test_fixture_manifest.py
      # Kein Netz zu einer gescrapten Seite und keine DB: live und integration
      # sind abgewaehlt. Der Integrationsjob mit postgres-Service kommt mit der
      # DoD (E0.9) additiv dazu.
      - run: uv run pytest -m "not live and not integration"

  # Der einzige Ort, an dem die Phase-0-DoD wirklich bewiesen wird: Migrationen
  # gegen ein echtes postgres:16, dann die Integrationstests. Muss rot sein,
  # wenn das Schema falsch ist. Laeuft nach lint/typecheck, nicht parallel.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: kintsugi
          POSTGRES_DB: kintsugi
        ports:
          - 5432:5432
        # Healthcheck laeuft IM Container via pg_isready — kein psql-Client auf
        # dem Runner (F6). Alembic und die Tests warten darauf.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Passt zum Settings-Feld database_url_override (I0.2.1). Auf dem Runner
      # gibt es keinen XAMPP-Konflikt, also der Standardport 5432.
      KINTSUGI_DATABASE_URL_OVERRIDE: postgresql+psycopg://postgres:kintsugi@localhost:5432/kintsugi
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      # Diskreter Schritt vor jedem pytest: schlaegt der Upgrade fehl, ist der
      # Job rot, bevor ueberhaupt getestet wird.
      - run: uv run alembic upgrade head
      - run: uv run pytest tests/integration/test_migrations_roundtrip.py -m integration
      # Die Phase-0 Definition of Done als eigener, gut sichtbarer Schritt.
      - run: uv run pytest tests/integration/test_phase0_dod.py -m integration
      - run: uv run pytest -m integration --junitxml=pytest-integration.xml
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-integration-report
          path: pytest-integration.xml

  # Haelt die getrackten Dokumente konsistent: keine toten Links, keine
  # Stack-Altlasten, und jede "enforced" Zeile der COMPLIANCE-Tabelle hat ein
  # importierbares Modul und einen aufloesbaren Test.
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/test_docs_links.py tests/compliance/test_enforcement_table.py
      # Zulassungspruefung (I1.5.1): jede in packs/**/*.yaml deklarierte Eintritts-URL
      # muss robots-erlaubt sein. Bricht den Build bei jeder verbotenen URL.
      - run: uv run python tools/check_sources.py --offline
