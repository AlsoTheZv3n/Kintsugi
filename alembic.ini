# Alembic-Konfiguration. Bewusst OHNE hartcodierte sqlalchemy.url: die URL kommt
# in migrations/env.py aus dem Settings-Modul, damit KINTSUGI_PG_PORT auch die
# Migrationen bewegt und kein Verbindungsstring im Repo landet.

[alembic]
script_location = migrations
# Revisionen heissen NNNN_slug.py, damit die Reihenfolge im Dateisystem der
# Migrationsreihenfolge entspricht.
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
path_separator = os
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
